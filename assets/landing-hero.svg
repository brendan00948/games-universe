<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Game icons collage placeholder">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0c24"/>
      <stop offset="100%" style="stop-color:#2d1840"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#g1)"/>
  <!-- scattered rounded tiles suggesting app icons -->
  <g filter="url(#glow)">
    <rect x="48" y="72" width="88" height="88" rx="18" fill="#2ecc71" transform="rotate(-8 92 116)"/>
    <rect x="420" y="56" width="92" height="92" rx="18" fill="#ffee66" transform="rotate(6 466 102)"/>
    <rect x="260" y="40" width="86" height="86" rx="16" fill="#42a5f5" transform="rotate(-4 303 83)"/>
    <rect x="140" y="200" width="96" height="96" rx="20" fill="#ff3d6c" transform="rotate(5 188 248)"/>
    <rect x="380" y="210" width="90" height="90" rx="18" fill="#ee66ff" transform="rotate(-6 425 255)"/>
    <rect x="60" y="320" width="94" height="94" rx="20" fill="#ffb347" transform="rotate(7 107 367)"/>
    <rect x="240" y="300" width="100" height="100" rx="22" fill="#7cb342" transform="rotate(-5 290 350)"/>
    <rect x="460" y="340" width="86" height="86" rx="16" fill="#ffd04a" transform="rotate(8 503 383)"/>
    <rect x="160" y="420" width="92" height="92" rx="18" fill="#26c6da" transform="rotate(-7 206 466)"/>
    <rect x="340" y="440" width="96" height="96" rx="20" fill="#ab47bc" transform="rotate(4 388 488)"/>
  </g>
  <text x="300" y="560" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="system-ui,sans-serif" font-size="13">Placeholder  add assets/landing-hero.png</text>
</svg>
